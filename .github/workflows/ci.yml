name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync (with optional API extra so all tests run)
        run: uv sync --extra api --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check src

      - name: Test
        run: uv run pytest -q
