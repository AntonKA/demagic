<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03110b"/>
      <stop offset="0.5" stop-color="#05170f"/>
      <stop offset="1" stop-color="#02100a"/>
    </linearGradient>
    <radialGradient id="centerglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14532d" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#39ff14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="seam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a3e635" stop-opacity="1"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <linearGradient id="steel2neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="0.16" stop-color="#9ca3af"/>
      <stop offset="0.36" stop-color="#5b6675"/>
      <stop offset="0.54" stop-color="#34d399"/>
      <stop offset="0.76" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <filter id="textglow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <ellipse cx="640" cy="210" rx="520" ry="260" fill="url(#centerglow)" filter="url(#soft)"/>

  <!-- faint circuit grid -->
  <g stroke="#0f3d28" stroke-width="1" opacity="0.45">
    <path d="M0 70 H1280 M0 140 H1280 M0 210 H1280 M0 280 H1280 M0 350 H1280"/>
    <path d="M160 0 V420 M360 0 V420 M560 0 V420 M720 0 V420 M920 0 V420 M1120 0 V420"/>
  </g>

  <!-- LEFT: dim, tangled legacy code -->
  <g opacity="0.6" stroke-linecap="round">
    <g fill="none" stroke="#15803d" stroke-width="3">
      <path d="M150 118 l-26 22 l26 22"/>
      <path d="M214 118 l26 22 l-26 22"/>
      <path d="M120 250 l-22 18 l22 18"/>
      <path d="M178 250 l22 18 l-22 18"/>
    </g>
    <g fill="#166534">
      <rect x="96" y="180" width="120" height="8" rx="4"/>
      <rect x="120" y="200" width="80" height="8" rx="4" opacity="0.7"/>
      <rect x="96" y="312" width="96" height="8" rx="4" opacity="0.8"/>
      <rect x="120" y="332" width="64" height="8" rx="4" opacity="0.55"/>
    </g>
  </g>

  <!-- dissolving particles drifting left->center -->
  <g fill="#22c55e">
    <rect x="250" y="120" width="9" height="9" opacity="0.8"/>
    <rect x="286" y="158" width="6" height="6" opacity="0.6"/>
    <rect x="262" y="214" width="7" height="7" opacity="0.55"/>
    <rect x="300" y="250" width="8" height="8" opacity="0.5"/>
    <rect x="276" y="300" width="5" height="5" opacity="0.4"/>
    <circle cx="330" cy="180" r="2.5" opacity="0.7"/>
    <circle cx="360" cy="240" r="2" opacity="0.5"/>
  </g>

  <!-- transformation flow curves: dim legacy -> bright modern -->
  <g fill="none" filter="url(#glow)" stroke-linecap="round">
    <path d="M300 150 C 480 110, 540 150, 720 150" stroke="url(#flow)" stroke-width="3.5" opacity="0.9"/>
    <path d="M300 210 C 470 210, 560 210, 720 210" stroke="url(#flow)" stroke-width="4" opacity="1"/>
    <path d="M300 270 C 480 320, 540 270, 720 270" stroke="url(#flow)" stroke-width="3.5" opacity="0.9"/>
  </g>

  <!-- center transformation seam -->
  <rect x="636" y="30" width="8" height="360" fill="url(#seam)" filter="url(#soft)"/>
  <rect x="639" y="30" width="2" height="360" fill="#eafff0" opacity="0.9"/>
  <g fill="#a3e635">
    <circle cx="610" cy="150" r="3" opacity="0.85"/>
    <circle cx="665" cy="120" r="2.4" opacity="0.7"/>
    <circle cx="620" cy="250" r="2.6" opacity="0.65"/>
    <circle cx="672" cy="300" r="3.2" opacity="0.75"/>
    <circle cx="700" cy="190" r="2.2" opacity="0.6"/>
  </g>

  <!-- RIGHT: bright neon modern code streams -->
  <g filter="url(#glow)">
    <rect x="726" y="120" width="150" height="9" rx="4.5" fill="url(#neon)"/>
    <rect x="890" y="120" width="70" height="9" rx="4.5" fill="#22c55e" opacity="0.65"/>
    <rect x="758" y="148" width="120" height="9" rx="4.5" fill="url(#neon)" opacity="0.85"/>
    <rect x="726" y="176" width="96" height="9" rx="4.5" fill="#39ff14" opacity="0.8"/>
    <rect x="836" y="176" width="124" height="9" rx="4.5" fill="url(#neon)" opacity="0.9"/>
    <rect x="758" y="204" width="80" height="9" rx="4.5" fill="#a3e635" opacity="0.7"/>
    <rect x="758" y="246" width="150" height="9" rx="4.5" fill="url(#neon)"/>
    <rect x="922" y="246" width="56" height="9" rx="4.5" fill="#34d399" opacity="0.6"/>
    <rect x="726" y="274" width="110" height="9" rx="4.5" fill="url(#neon)" opacity="0.85"/>
    <rect x="758" y="302" width="86" height="9" rx="4.5" fill="#39ff14" opacity="0.7"/>
  </g>

  <!-- neon braces hinting at code -->
  <g fill="none" stroke="#39ff14" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity="0.9">
    <path d="M1030 150 q-16 0 -16 18 q0 18 -16 18 q16 0 16 18 q0 18 16 18"/>
    <path d="M1095 150 q16 0 16 18 q0 18 16 18 q-16 0 -16 18 q0 18 -16 18"/>
  </g>

  <!-- ambient particles -->
  <g fill="#4ade80">
    <circle cx="980" cy="110" r="2" opacity="0.5"/>
    <circle cx="1140" cy="200" r="2.4" opacity="0.6"/>
    <circle cx="1050" cy="330" r="2" opacity="0.45"/>
    <circle cx="430" cy="120" r="1.8" opacity="0.4"/>
    <circle cx="500" cy="330" r="2" opacity="0.4"/>
  </g>

  <!-- dark plate so the wordmark reads over the busy field -->
  <rect x="332" y="150" width="616" height="120" rx="26" fill="#02100a" opacity="0.5" filter="url(#soft)"/>

  <!-- WORDMARK: steel -> futuristic digital -->
  <text x="640" y="244" text-anchor="middle" font-size="98" font-weight="800"
        letter-spacing="-3" font-family="'Segoe UI','DejaVu Sans',Arial,sans-serif"
        fill="url(#steel2neon)" filter="url(#textglow)">demagic</text>

  <!-- digital fragments breaking off the trailing edge -->
  <g fill="#a3e635">
    <rect x="878" y="196" width="11" height="11" opacity="0.9"/>
    <rect x="898" y="176" width="7" height="7" opacity="0.7"/>
    <rect x="900" y="216" width="6" height="6" opacity="0.6"/>
    <rect x="918" y="200" width="5" height="5" opacity="0.5"/>
    <rect x="930" y="186" width="4" height="4" opacity="0.4"/>
  </g>
</svg>
