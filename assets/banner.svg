<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" font-family="'Segoe UI','DejaVu Sans',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b16"/>
      <stop offset="0.55" stop-color="#0c1222"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="seam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="modern" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>

  <!-- faint circuit grid -->
  <g stroke="#1b2740" stroke-width="1" opacity="0.5">
    <path d="M0 70 H1280 M0 140 H1280 M0 210 H1280 M0 280 H1280 M0 350 H1280"/>
    <path d="M160 0 V420 M360 0 V420 M560 0 V420 M760 0 V420 M960 0 V420 M1160 0 V420"/>
  </g>

  <!-- LEFT: tangled legacy XML / 4GL, dim amber, dissolving -->
  <g fill="none" stroke="#f59e0b" opacity="0.55" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <path d="M120 120 l-26 22 l26 22"/>
    <path d="M186 120 l26 22 l-26 22"/>
    <path d="M150 96 l8 92" stroke="#d97706"/>
    <path d="M96 250 l-22 18 l22 18"/>
    <path d="M150 250 l22 18 l-22 18" stroke="#d97706"/>
  </g>
  <g fill="#b45309" opacity="0.5" font-size="15" font-family="'Consolas','DejaVu Sans Mono',monospace">
    <text x="74" y="80">&lt;Task&gt;</text>
    <text x="208" y="208">&lt;Prg/&gt;</text>
    <text x="70" y="330">DataView</text>
  </g>
  <!-- dissolving shards -->
  <g fill="#f59e0b" opacity="0.7">
    <rect x="250" y="110" width="10" height="10" opacity="0.7"/>
    <rect x="268" y="150" width="7" height="7" opacity="0.5"/>
    <rect x="244" y="210" width="6" height="6" opacity="0.45"/>
    <rect x="276" y="250" width="9" height="9" opacity="0.4"/>
    <rect x="258" y="300" width="5" height="5" opacity="0.3"/>
  </g>

  <!-- CENTER transformation seam -->
  <rect x="636" y="20" width="8" height="380" fill="url(#seam)" filter="url(#softglow)"/>
  <rect x="639" y="20" width="2" height="380" fill="#ffffff" opacity="0.85"/>
  <g fill="#a78bfa">
    <circle cx="600" cy="150" r="3" opacity="0.8"/>
    <circle cx="660" cy="120" r="2.4" opacity="0.7"/>
    <circle cx="615" cy="250" r="2.6" opacity="0.6"/>
    <circle cx="672" cy="300" r="3.2" opacity="0.7"/>
    <circle cx="700" cy="190" r="2.2" opacity="0.6"/>
  </g>

  <!-- RIGHT: clean modern code streams -->
  <g filter="url(#glow)">
    <rect x="720" y="112" width="150" height="9" rx="4.5" fill="url(#modern)" opacity="0.95"/>
    <rect x="884" y="112" width="70" height="9" rx="4.5" fill="#22d3ee" opacity="0.6"/>
    <rect x="752" y="140" width="118" height="9" rx="4.5" fill="url(#modern)" opacity="0.8"/>
    <rect x="720" y="168" width="96" height="9" rx="4.5" fill="#e879f9" opacity="0.7"/>
    <rect x="830" y="168" width="120" height="9" rx="4.5" fill="url(#modern)" opacity="0.85"/>
    <rect x="752" y="252" width="150" height="9" rx="4.5" fill="url(#modern)" opacity="0.9"/>
    <rect x="916" y="252" width="60" height="9" rx="4.5" fill="#818cf8" opacity="0.6"/>
    <rect x="720" y="280" width="110" height="9" rx="4.5" fill="url(#modern)" opacity="0.75"/>
    <rect x="752" y="308" width="86" height="9" rx="4.5" fill="#22d3ee" opacity="0.6"/>
  </g>
  <text x="1015" y="200" font-size="58" font-weight="700" fill="#0ea5b7" opacity="0.18"
        font-family="'Consolas','DejaVu Sans Mono',monospace">&gt;_</text>

  <!-- WORDMARK -->
  <text x="640" y="232" text-anchor="middle" font-size="92" font-weight="800"
        letter-spacing="-2" fill="url(#wm)" filter="url(#glow)">demagic</text>
  <text x="640" y="280" text-anchor="middle" font-size="21" font-weight="500"
        fill="#cbd5e1" letter-spacing="0.5">Break the Magic spell &#8212; legacy Magic xpa &#8594; modern Python</text>

  <!-- coverage badge -->
  <g transform="translate(534,318)">
    <rect width="212" height="34" rx="17" fill="#0b1426" stroke="#22d3ee" stroke-opacity="0.5"/>
    <circle cx="22" cy="17" r="6" fill="#34d399"/>
    <text x="40" y="22" font-size="14.5" font-weight="600" fill="#a5f3fc">100% coverage ledger</text>
  </g>
</svg>
